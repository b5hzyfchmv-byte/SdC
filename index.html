<div id="root"></div>

<script>
(function () {
  function init() {
    if (localStorage.getItem('cap_v2')) return;
    localStorage.setItem('cap_teachers', JSON.stringify([]));
    localStorage.setItem('cap_events',   JSON.stringify([]));
    localStorage.setItem('cap_regs',     JSON.stringify([]));
    localStorage.setItem('cap_att',      JSON.stringify([]));
    localStorage.setItem('cap_v2', '1');
  }
  init();

  const uid  = () => Math.random().toString(36).slice(2, 9);
  const get  = k  => JSON.parse(localStorage.getItem(k) || '[]');
  const set  = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  /* Normalize RUT to "NNNNNNN-D" regardless of dots / spacing */
  const normRut = r => {
    if(!r || typeof r !== 'string') return '';
    const c = r.replace(/[.\s]/g, '').toUpperCase();
    const body = c.slice(0, -1).replace(/-/g, '');
    const dv   = c.slice(-1);
    return body + '-' + dv;
  };
  const sameRut = (a, b) => {
    if(!a || !b) return false;
    return normRut(String(a)) === normRut(String(b));
  };

  /* Limpiar sesión corrupta al arrancar */
  try {
    const s = JSON.parse(localStorage.getItem('cap_session'));
    if(s && s.role === 'docente' && !s.rut) {
      localStorage.removeItem('cap_session');
    }
  } catch(e) {
    localStorage.removeItem('cap_session');
  }



  window.DB = {
    normRut,
    sameRut,

    /* Teachers */
    teachers:    ()      => get('cap_teachers'),
    findTeacher: rut     => get('cap_teachers').find(t => sameRut(t.rut, rut)),
    addTeacher:  t       => { const arr = get('cap_teachers'); arr.push(t); set('cap_teachers', arr); },

    /* Events */
    events:      ()      => get('cap_events'),
    event:       id      => get('cap_events').find(e => e.id === id),
    addEvent:    e       => { const arr = get('cap_events'); arr.push({ ...e, id: e.id || ('e-' + uid()), updatedAt: Date.now() }); set('cap_events', arr); },
    deleteEvent: id      => set('cap_events', get('cap_events').filter(e => e.id !== id)),
    updateEvent: ev      => set('cap_events', get('cap_events').map(e => e.id === ev.id ? { ...e, ...ev, updatedAt: Date.now() } : e)),
    setEstadoPublicacion: (eid, estado) => set('cap_events', get('cap_events').map(e => e.id === eid ? { ...e, estadoPublicacion: estado } : e)),

    /* Registrations */
    regs:        ()      => get('cap_regs'),
    eventRegs:   eid     => get('cap_regs').filter(r => r.eid === eid),
    teacherRegs: rut     => get('cap_regs').filter(r => sameRut(r.rut, rut)),
    isReg:       (eid, rut) => get('cap_regs').some(r => r.eid === eid && sameRut(r.rut, rut)),
    register:    (eid, rut) => { const arr = get('cap_regs'); arr.push({ id: 'r-' + uid(), eid, rut, fecha: new Date().toISOString().slice(0,10), registradoAt: Date.now() }); set('cap_regs', arr); },
    unregister:  (eid, rut) => {
      set('cap_regs', get('cap_regs').filter(r => !(r.eid === eid && sameRut(r.rut, rut))));
      try { window.dispatchEvent(new CustomEvent('cap:datachange',{detail:'regs'})); } catch(e) {}
    },

    /* Attendance */
    atts:        ()      => get('cap_att'),
    eventAtts:   eid     => get('cap_att').filter(a => a.eid === eid && a.tipo !== 'no_asistio'),
    teacherAtts: rut     => get('cap_att').filter(a => sameRut(a.rut, rut) && a.tipo !== 'no_asistio'),
    hasAtt:      (eid, rut) => get('cap_att').some(a => a.eid === eid && sameRut(a.rut, rut) && a.tipo !== 'no_asistio'),
    hasNoAtt:    (eid, rut) => get('cap_att').some(a => a.eid === eid && sameRut(a.rut, rut) && a.tipo === 'no_asistio'),
    markAtt:     (eid, rut, noAsistio=false) => { const arr = get('cap_att'); arr.push({ id:(noAsistio?'na-':'a-') + uid(), eid, rut, fecha: new Date().toISOString().slice(0,10), tipo: noAsistio?'no_asistio':'asistio' }); set('cap_att', arr); },

    /* Closed events */
    closedEvents: () => { try{ return JSON.parse(localStorage.getItem('cap_closed')||'[]'); }catch{return [];} },
    isClosed: eid => { try{ return JSON.parse(localStorage.getItem('cap_closed')||'[]').includes(eid); }catch{return false;} },
    closeEvent: eid => {
      const arr=JSON.parse(localStorage.getItem('cap_closed')||'[]');
      if(!arr.includes(eid)){arr.push(eid);localStorage.setItem('cap_closed',JSON.stringify(arr));}
      // Sincronizar estado a Google Sheets
      const cfg=getSPConfig();
      if(cfg.mode==='googlesheets'&&cfg.gsUrl){
        const ev=get('cap_events').find(e=>e.id===eid);
        if(ev) GS.update('Eventos',eid,sanitizeRow([ev.id,ev.nombre,ev.tipo,ev.fecha,ev.hora,ev.lugar,ev.cupos,ev.relator,ev.descripcion||'',new Date().toISOString().slice(0,10),'CERRADO',ev.duracion||60,ev.estadoPublicacion||'Abierto',ev.fechaApertura||''])).catch(()=>{});
      }
    },
    reopenEvent: eid => {
      const arr=JSON.parse(localStorage.getItem('cap_closed')||'[]').filter(x=>x!==eid);
      localStorage.setItem('cap_closed',JSON.stringify(arr));
      // Sincronizar reapertura a Google Sheets
      const cfg=getSPConfig();
      if(cfg.mode==='googlesheets'&&cfg.gsUrl){
        const ev=get('cap_events').find(e=>e.id===eid);
        if(ev){ const hoy=new Date().toISOString().slice(0,10); const est=ev.fecha>hoy?'Próximo':ev.fecha===hoy?'Hoy':'Realizado'; GS.update('Eventos',eid,sanitizeRow([ev.id,ev.nombre,ev.tipo,ev.fecha,ev.hora,ev.lugar,ev.cupos,ev.relator,ev.descripcion||'',hoy,est,ev.duracion||60,ev.estadoPublicacion||'Abierto',ev.fechaApertura||''])).catch(()=>{}); }
      }
    },

    /* Limpia todos los datos locales */
    reset: () => {
      ['cap_teachers','cap_events','cap_regs','cap_att','cap_closed','cap_v2','cap_last_sync'].forEach(k => localStorage.removeItem(k));
      // Nota: cap_sp_config (configuración GS) se preserva intencionalmente
      init();
    },
  };
})();

</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const DEV_MODE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const TODAY = new Date().toISOString().slice(0,10);

// DESARROLLO: limpiar bloqueo de intentos al recargar la página (solo en localhost)
if(DEV_MODE) sessionStorage.removeItem('adm_att');

/* ════════════════════════════════════════════════════════════════
   CONFIGURACIÓN GOOGLE SHEETS
   Almacena modo, URL del Apps Script y credenciales del admin.
   Persistido en localStorage bajo la clave SP_KEY.
   ════════════════════════════════════════════════════════════════ */
const SP_KEY = 'cap_sp_config';
const SP_DEFAULTS = {
  mode: 'local',      // 'local' | 'googlesheets'
  gsUrl: '',          // Apps Script Web App URL
  adminUser: 'Admin',
  adminPass: '123456',
};
/* Ofusca/desofusca la URL del Apps Script en localStorage */
const _enc = s => { try { return s ? btoa(encodeURIComponent(s)) : s; } catch { return s; } };
const _dec = s => { try { return s ? decodeURIComponent(atob(s)) : s; } catch { return s; } };

/* ════════════════════════════════════════════════════════════════
   DEPLOY CONFIG — Editar UNA vez antes de distribuir el archivo.
   ────────────────────────────────────────────────────────────────
   gsUrl  : URL del Apps Script Web App (copiar desde "Implementar").
            Si se deja vacío, el sistema arranca en modo local.
   gsToken: Cadena secreta compartida con el Apps Script.
            Debe coincidir exactamente con CAP_TOKEN en el script.
            Ej: 'cap-2025-xK9m-P2qR' (inventa el tuyo, sin espacios).
            Si se deja vacío, el sistema funciona sin protección de token.
   ════════════════════════════════════════════════════════════════ */
const DEPLOY_CONFIG = {
  gsUrl:   'https://script.google.com/macros/s/AKfycbzKY73425zhtfOZ0c4vqZY_ohf5Ijtm2EPuHa9bMYeR-fQV9eAX_vc7HXO4p9xKRSNRxA/exec',         // ← pegar URL del Apps Script aquí
  gsToken: 'rod123456',         // ← definir token secreto (mismo valor en Apps Script)
};

/* getSPConfig: fusiona SP_DEFAULTS → localStorage → DEPLOY_CONFIG
   Si DEPLOY_CONFIG.gsUrl está configurado, el modo es siempre
   'googlesheets' automáticamente — no requiere campo mode separado.
   El token NUNCA se guarda en localStorage (reducir exposición). */
const getSPConfig = () => {
  try {
    const raw = JSON.parse(localStorage.getItem(SP_KEY));
    const cfg = { ...SP_DEFAULTS, ...raw };
    if (cfg.gsUrl)              cfg.gsUrl     = _dec(cfg.gsUrl);
    if (raw && raw.adminPass)   cfg.adminPass = _dec(cfg.adminPass);
    // Si DEPLOY_CONFIG tiene URL, sobreescribe y fuerza modo googlesheets
    if (DEPLOY_CONFIG.gsUrl) {
      cfg.gsUrl = DEPLOY_CONFIG.gsUrl;
      cfg.mode  = 'googlesheets';
    }
    // El token siempre viene de DEPLOY_CONFIG, nunca de localStorage
    cfg.gsToken = DEPLOY_CONFIG.gsToken || '';
    return cfg;
  } catch(e) {
    return {
      ...SP_DEFAULTS,
      gsUrl:   DEPLOY_CONFIG.gsUrl   || '',
      mode:    DEPLOY_CONFIG.gsUrl   ? 'googlesheets' : 'local',
      gsToken: DEPLOY_CONFIG.gsToken || '',
    };
  }
};

const saveSPConfig = cfg => {
  const toSave = { ...cfg };
  if (toSave.gsUrl)    toSave.gsUrl    = _enc(toSave.gsUrl);
  if (toSave.adminPass) toSave.adminPass = _enc(toSave.adminPass);
  // No guardar gsToken en localStorage
  delete toSave.gsToken;
  localStorage.setItem(SP_KEY, JSON.stringify(toSave));
};

/* applyDeployConfig: sincroniza localStorage con DEPLOY_CONFIG al cargar.
   Solo actúa si DEPLOY_CONFIG.gsUrl está rellenado Y la URL guardada
   localmente es diferente (instalación nueva o URL actualizada). */
(function applyDeployConfig() {
  if (!DEPLOY_CONFIG.gsUrl) return;
  try {
    const raw = JSON.parse(localStorage.getItem(SP_KEY) || '{}');
    const storedUrl = raw.gsUrl ? _dec(raw.gsUrl) : '';
    if (storedUrl === DEPLOY_CONFIG.gsUrl && raw.mode === 'googlesheets') return;
    localStorage.setItem(SP_KEY, JSON.stringify({
      ...raw,
      mode:  'googlesheets',            // siempre GS cuando hay URL
      gsUrl: _enc(DEPLOY_CONFIG.gsUrl),
    }));
  } catch(e) {}
})();

/* ════════════════════════════════════════════════════════════════
   PIN HASHING  — Web Crypto API (SHA-256, sin dependencias externas)
   Los PINs nunca se almacenan en texto plano.
   Prefijo "sha256:" distingue hashes de PINs legacy en texto plano.
   ════════════════════════════════════════════════════════════════ */
const PIN_PREFIX = 'sha256:';
async function hashPin(pin) {
  if (!pin) return '';
  const buf = await crypto.subtle.digest(
    'SHA-256',
    new TextEncoder().encode(String(pin))
  );
  const hex = Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0')).join('');
  return PIN_PREFIX + hex;
}
async function verifyPin(entered, stored) {
  if (!entered || !stored) return false;
  // Compatibilidad: si el hash guardado es legacy (texto plano), comparar directo
  if (!stored.startsWith(PIN_PREFIX)) return String(entered) === String(stored);
  const enteredHash = await hashPin(entered);
  return enteredHash === stored;
}

/* ════════════════════════════════════════════════════════════════
   API LOG (bus de eventos global)
   ════════════════════════════════════════════════════════════════ */
const APIBus = {
  entries: [],
  subs: new Set(),
  push(entry) {
    this.entries.unshift({ ...entry, id: Date.now(), ts: new Date().toLocaleTimeString('es-CL') });
    if (this.entries.length > 30) this.entries.length = 30;
    this.subs.forEach(fn => fn([...this.entries]));
  },
  log(method, endpoint, status, payload) {
    this.push({ method, endpoint, status, payload });
  },
};
function useAPILog() {
  const [entries, set] = useState([...APIBus.entries]);
  useEffect(() => { const fn = e => set(e); APIBus.subs.add(fn); return () => APIBus.subs.delete(fn); }, []);
  return entries;
}

/* ════════════════════════════════════════════════════════════════
   SANITIZACIÓN  — previene inyección de fórmulas en Google Sheets
   Cualquier celda que empiece con = + - @ \t \r recibe un apóstrofe
   que fuerza a Sheets a tratarla como texto plano.
   ════════════════════════════════════════════════════════════════ */
const sanitizeCell = v => {
  if (v === null || v === undefined) return '';
  const s = String(v);
  return /^[=+\-@\t\r]/.test(s) ? "'" + s : s;
};
const sanitizeRow = arr => arr.map(sanitizeCell);

/* ════════════════════════════════════════════════════════════════
   GOOGLE SHEETS API  — lectura, escritura y actualización
   Comunicación via Apps Script Web App desplegado como "Cualquier usuario".
   GET  → doGet(e)  con parámetro "accion" y otros parámetros
   POST → doPost(e) con body JSON
   IMPORTANTE: Google redirige los POST a una URL diferente.
   Para evitar el error CORS usamos mode:'no-cors' en escrituras
   (fire-and-forget). Para lecturas usamos GET normal que sí devuelve JSON.
   ════════════════════════════════════════════════════════════════ */
const GS = {
  url()   { return getSPConfig().gsUrl   || ''; },
  token() { return getSPConfig().gsToken || ''; },

  /* ── LECTURA ─────────────────────────────────────────────────
     GET ?accion=leer&hoja=Docentes&token=…
     Responde: { ok:true, datos:[[...],[...]] }               */
  async read(hoja) {
    const url = GS.url();
    if (!url) return [];
    const endpoint = url
      + '?accion=leer&hoja=' + encodeURIComponent(hoja)
      + '&token=' + encodeURIComponent(GS.token());
    APIBus.log('GET', endpoint.slice(0,80)+'…', '⟳', null);
    try {
      const res  = await fetch(endpoint, { redirect: 'follow' });
      const json = await res.json();
      if (!json.ok) { APIBus.log('GET', hoja, 'ERR', json); return []; }
      APIBus.log('GET', hoja, 200, { filas: (json.datos||[]).length });
      return json.datos || [];
    } catch(e) {
      APIBus.log('GET', hoja, 500, { error: e.message });
      return [];
    }
  },

  /* ── ESCRITURA (nueva fila) ─────────────────────────────────
     POST { accion:'agregar', hoja, fila:[...], token }       */
  async append(hoja, fila) {
    const url = GS.url();
    if (!url) { APIBus.log('SKIP', hoja+' append', '-', fila); return false; }
    APIBus.log('POST', hoja+' → append', '⟳', fila);
    try {
      await fetch(url, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ accion: 'agregar', hoja, fila, token: GS.token() }),
      });
      APIBus.log('POST', hoja+' → append', 200, { nota: 'fila agregada' });
      return true;
    } catch(e) {
      APIBus.log('POST', hoja+' → append', 500, { error: e.message });
      return false;
    }
  },

  /* ── ACTUALIZACIÓN (editar fila existente por clave) ────────
     POST { accion:'actualizar', hoja, clave, fila:[...], token } */
  async update(hoja, clave, fila) {
    const url = GS.url();
    if (!url) { APIBus.log('SKIP', hoja+' update', '-', fila); return false; }
    APIBus.log('POST', hoja+' → update '+clave, '⟳', fila);
    try {
      await fetch(url, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ accion: 'actualizar', hoja, clave, fila, token: GS.token() }),
      });
      APIBus.log('POST', hoja+' → update', 200, { nota: 'fila actualizada' });
      return true;
    } catch(e) {
      APIBus.log('POST', hoja+' → update', 500, { error: e.message });
      return false;
    }
  },

  /* ── MARCAR ELIMINADO (no borra la fila, la marca) ──────────
     POST { accion:'eliminar', hoja, clave, token }           */
  async markDeleted(hoja, clave) {
    const url = GS.url();
    if (!url) return false;
    APIBus.log('POST', hoja+' → eliminar '+clave, '⟳', null);
    try {
      await fetch(url, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ accion: 'eliminar', hoja, clave, token: GS.token() }),
      });
      APIBus.log('POST', hoja+' → eliminar', 200, null);
      return true;
    } catch(e) { return false; }
  },

  /* ── BOOTSTRAP: carga todas las hojas al inicio ─────────────
     Lee las 4 hojas, fusiona datos locales pendientes y vuelca
     en localStorage como caché. Registra hora de última sync.  */
  async bootstrap() {
    APIBus.log('GET', '━━ Bootstrap Google Sheets ━━', '⟳', null);
    try {
      // Guardar estado local ANTES de sobreescribir
      const localTeachers = (() => {
        try { return JSON.parse(localStorage.getItem('cap_teachers')||'[]'); } catch{ return []; }
      })();

      const [docentes, eventos, regs, atts, configRows] = await Promise.all([
        GS.read('Docentes'),
        GS.read('Eventos'),
        GS.read('Inscripciones'),
        GS.read('Asistencias'),
        GS.read('Configuracion'),
      ]);

      // Columnas: RUT | Nombre | Email | Especialidad | PIN | Fecha | Estado
      const gsTeachers = docentes
        .filter(f => f[0] && f[0] !== 'RUT')
        .map(f => ({ rut:f[0]||'', nombre:f[1]||'', email:f[2]||'', especialidad:f[3]||'', pin:f[4]||'', estado:f[6]||'activo' }));

      // Preservar docentes locales con PIN que aún no llegaron a GS (pending-sync)
      // y también actualizar PINs configurados localmente que GS aún no tiene
      const teachers = [...gsTeachers];
      localTeachers.forEach(lt => {
        const gsIdx = teachers.findIndex(gt => {
          try { return DB.sameRut(gt.rut, lt.rut); } catch{ return false; }
        });
        if(gsIdx === -1) {
          // Docente existe solo local — preservar y re-intentar sync a GS
          if(lt.nombre) {
            teachers.push(lt);
            GS.addDocente(lt).catch(()=>{});
            APIBus.log('POST','pending-sync '+lt.rut,'⟳',{nombre:lt.nombre});
          }
        } else if(lt.pin && !teachers[gsIdx].pin) {
          // PIN configurado localmente pero no en GS — preservar localmente y sincronizar
          teachers[gsIdx] = {...teachers[gsIdx], pin: lt.pin};
          GS.updateDocente({...teachers[gsIdx], pin: lt.pin}).catch(()=>{});
        }
      });

      // Columnas: ID | Nombre | Tipo | Fecha | Hora | Lugar | Cupos | Relator | Descripción | Creado | Estado
      const normFecha = v => { if(!v) return ''; const s=String(v); return s.length>=10?s.slice(0,10):s; };
      const normHora  = v => {
        if(!v) return '09:00';
        const s=String(v);
        if(s.includes('T')) {
          try {
            const d=new Date(s);
            return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
          } catch(e) {}
        }
        if(/^\d{1,2}:\d{2}/.test(s)) return s.slice(0,5);
        return '09:00';
      };
      // Columnas: ID | Nombre | Tipo | Fecha | Hora | Lugar | Cupos | Relator | Descripción | Creado | Estado | Duración | EstadoPublicacion | FechaApertura
      const eventsArr = eventos
        .filter(f => f[0] && f[0] !== 'ID' && f[10] !== 'ELIMINADO')
        .map(f => ({ id:f[0]||'', nombre:f[1]||'', tipo:f[2]||'Taller',
          fecha:normFecha(f[3]), hora:normHora(f[4]),
          lugar:f[5]||'', cupos:+f[6]||0, relator:f[7]||'', descripcion:f[8]||'',
          duracion:f[11]?+f[11]:60,
          estadoPublicacion:f[12]||'Abierto',
          fechaApertura:normFecha(f[13])||'' }));

      // Columnas: ID | EventoID | RUT | Fecha | Estado
      const regsRaw = regs
        .filter(f => f[0] && f[0] !== 'ID' && f[4] !== 'Cancelada' && String(f[0]).startsWith('r'))
        .map(f => ({ id:f[0]||'', eid:f[1]||'', rut:f[2]||'', fecha:f[3]||'' }));
      // Deduplicar por (eid, rut) — mantiene la primera ocurrencia
      const _regsSeen = new Set();
      const regsArr = regsRaw.filter(r => {
        const key = r.eid + '|' + DB.normRut(r.rut);
        if(_regsSeen.has(key)) return false;
        _regsSeen.add(key); return true;
      });

      // Columnas: ID | EventoID | RUT | Fecha | RegistradoPor
      const attsArr = atts
        .filter(f => f[0] && f[0] !== 'ID')
        .map(f => ({ id:f[0]||'', eid:f[1]||'', rut:f[2]||'', fecha:f[3]||'' }));

      localStorage.setItem('cap_teachers', JSON.stringify(teachers));
      localStorage.setItem('cap_events',   JSON.stringify(eventsArr));
      localStorage.setItem('cap_regs',     JSON.stringify(regsArr));
      localStorage.setItem('cap_att',      JSON.stringify(attsArr));
      localStorage.setItem('cap_v2', '1');
      localStorage.setItem('cap_last_sync', new Date().toISOString());

      // Guardar parámetros de configuración
      const sysConfig = {};
      (configRows||[]).filter(f=>f[0]&&f[0]!=='Clave').forEach(f=>{ sysConfig[f[0]]=f[1]||''; });
      setSysConfig(sysConfig);

      APIBus.log('GET', '━━ Bootstrap OK ━━', 200,
        { docentes:teachers.length, eventos:eventsArr.length,
          inscripciones:regsArr.length, asistencias:attsArr.length });
      return { ok:true, docentes:teachers.length, eventos:eventsArr.length };
    } catch(e) {
      APIBus.log('GET', '━━ Bootstrap ERROR ━━', 500, { error: e.message });
      return { ok:false, error: e.message };
    }
  },

  /* ── Busca docente por RUT o correo ─────────────────────────
     Lee la hoja y busca match. Devuelve objeto o null.        */
  async findDocente(rutOCorreo) {
    const filas = await GS.read('Docentes');
    const q = rutOCorreo.trim().toLowerCase();
    const normQ = q.replace(/[.\s-]/g,'');
    const fila = filas.find(f => {
      if(!f[0] || f[0]==='RUT') return false;
      const rutN  = (f[0]||'').replace(/[.\s-]/g,'').toLowerCase();
      const email = (f[2]||'').toLowerCase();
      return rutN === normQ || email === q;
    });
    if (!fila) return null;
    return { rut:fila[0], nombre:fila[1]||'', email:fila[2]||'',
             especialidad:fila[3]||'', pin:fila[4]||'' };
  },

  /* ── Helpers por entidad ─────────────────────────────────── */
  addDocente:    (t)       => GS.append('Docentes', sanitizeRow([t.rut, t.nombre, t.email, t.especialidad, t.pin||'', new Date().toISOString().slice(0,10), t.estado||'pendiente'])),
  updateDocente: (t)       => GS.update('Docentes', t.rut, sanitizeRow([t.rut, t.nombre, t.email, t.especialidad, t.pin||'', new Date().toISOString().slice(0,10), t.estado||'activo'])),
  addEvento:     (e)       => { const hoy=new Date().toISOString().slice(0,10); const est=e.fecha>hoy?'Próximo':e.fecha===hoy?'Hoy':'Realizado'; return GS.append('Eventos', sanitizeRow([e.id,e.nombre,e.tipo,e.fecha,e.hora,e.lugar,e.cupos,e.relator,e.descripcion||'',hoy,est,e.duracion||60,e.estadoPublicacion||'Abierto',e.fechaApertura||''])); },
  deleteEvento:  (id)      => GS.markDeleted('Eventos', id),
  updateEvento:  (e)       => { const hoy=new Date().toISOString().slice(0,10); const est=e.fecha>hoy?'Próximo':e.fecha===hoy?'Hoy':'Realizado'; return GS.update('Eventos',e.id, sanitizeRow([e.id,e.nombre,e.tipo,e.fecha,e.hora,e.lugar,e.cupos,e.relator,e.descripcion||'',hoy,est,e.duracion||60,e.estadoPublicacion||'Abierto',e.fechaApertura||''])); },
  addInscripcion:(d)       => GS.append('Inscripciones', sanitizeRow([d.id, d.eid, d.rut, new Date().toISOString().slice(0,10), 'Activa'])),

  /* ── INSCRIPCIÓN ATÓMICA (v3.0) ──────────────────────────────
     Usa mode:'cors' para leer la respuesta del servidor.
     El Apps Script ejecuta LockService para garantizar que
     dos peticiones simultáneas no superen el cupo.
     Si el servidor responde ok:false/error:'sin_cupos'
     el frontend NO registra localmente (prevención real).
     Si hay error de red/CORS, devuelve {ok:null} y el
     frontend cae en comportamiento optimista (igual que antes). */
  async inscribir(eid, rut, regId) {
    const url = GS.url();
    if (!url) return { ok: null, error: 'no_url' };
    APIBus.log('POST', 'Inscripciones → inscribir (lock)', '⟳', { eid, rut });
    try {
      const res = await fetch(url, {
        method: 'POST',
        mode: 'cors',              // queremos leer la respuesta
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' }, // sin preflight
        body: JSON.stringify({ accion: 'inscribir', eid, rut, id: regId, token: GS.token() }),
      });
      const json = await res.json();
      APIBus.log('POST', 'Inscripciones → inscribir', json.ok ? 200 : 'ERR', json);
      return json;
    } catch(e) {
      // CORS bloqueado o red caída → fallback fire-and-forget (comportamiento v2)
      APIBus.log('POST', 'Inscripciones → inscribir (fallback no-cors)', 'CORS', { error: e.message });
      try {
        await fetch(url, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ accion: 'inscribir', eid, rut, id: regId, token: GS.token() }),
        });
      } catch(_) {}
      return { ok: null, error: 'cors_fallback' }; // null = estado desconocido
    }
  },
  /* regId = ID real de la fila en GS (col[0]); regFecha = fecha original de inscripción */
  cancelInscripcion:(eid,rut,regId,regFecha) => {
    const hoy=new Date().toISOString().slice(0,10);
    const id=regId||eid;
    const fila=sanitizeRow([id,eid,rut,regFecha||hoy,'Cancelada']);
    return GS.update('Inscripciones',id,fila);
  },
  addAsistencia: (d)       => GS.append('Asistencias', sanitizeRow([d.id, d.eid, d.rut, new Date().toISOString().slice(0,10), d.tipo||'asistio'])),

  /* ── Log de actividad ────────────────────────────────────────
     Columnas: ID | Fecha | Hora | Tipo | Usuario | EventoID | Detalle */
  addLog: (tipo, usuario, eid, detalle) => {
    const ahora = new Date();
    const fecha = ahora.toISOString().slice(0,10);
    const hora  = ahora.toTimeString().slice(0,5);
    const id    = 'l-' + Date.now();
    return GS.append('Log', sanitizeRow([id, fecha, hora, tipo, usuario||'', eid||'', detalle||'']));
  },

  /* ── Configuración del sistema ───────────────────────────────
     Lee todos los pares Clave | Valor y devuelve un objeto     */
  async getConfig() {
    const filas = await GS.read('Configuracion');
    const cfg = {};
    filas.filter(f => f[0] && f[0] !== 'Clave').forEach(f => { cfg[f[0]] = f[1] || ''; });
    return cfg;
  },
  setConfig: (clave, valor) => GS.update('Configuracion', clave, [clave, valor]),
};

/* ── Valida dígito verificador del RUT chileno ── */
const validarRut = r => {
  if(!r || typeof r !== 'string') return false;
  const clean = r.replace(/[^0-9kK]/g,'').toUpperCase();
  if(clean.length < 2) return false;
  const dv   = clean.slice(-1);
  const body = clean.slice(0,-1);
  if(!/^\d+$/.test(body)) return false;
  let sum=0, mul=2;
  for(let i=body.length-1;i>=0;i--){sum+=parseInt(body[i])*mul;mul=mul===7?2:mul+1;}
  const expected = 11-(sum%11);
  const dvCalc = expected===11?'0':expected===10?'K':String(expected);
  return dv === dvCalc;
};

/* ── formatRut: convierte cualquier entrada al formato 12.345.678-9 ── */
const formatRut = r => {
  if(!r || typeof r !== 'string') return r;
  const clean = r.replace(/[^0-9kK]/g,'').toUpperCase();
  if(clean.length < 2) return r;
  const dv   = clean.slice(-1);
  const body = clean.slice(0,-1);
  const fmt  = body.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return fmt + '-' + dv;
};

/* ── useNow: returns current Date, refreshes every 30 s ── */
function useNow() {
  const [now,setNow]=useState(new Date());
  useEffect(()=>{ const id=setInterval(()=>setNow(new Date()),30000); return ()=>clearInterval(id); },[]);
  return now;
}

/* ── isCheckInOpen: ventana 10 min antes del inicio
       hasta 10 min después del fin (inicio + duración) ── */
function isCheckInOpen(ev, now) {
  if(!isToday(ev.fecha)) return false;
  const t=now||new Date();
  const nowMin=t.getHours()*60+t.getMinutes();
  const [hh,mm]=(ev.hora||'09:00').split(':').map(Number);
  const startMin=hh*60+mm;
  const durMin=ev.duracion?+ev.duracion:60;
  return nowMin>=(startMin-10) && nowMin<=(startMin+durMin+10);
}

  const colors=TIPO_C[event.tipo]||TIPO_C.Otro;
  return <Card p={0} onClick={onClick} style={{overflow:'hidden',...(onClick?{cursor:'pointer'}:{})}}>
    <div style={{height:4,background:colors.tx,opacity:.5}}/>

          {closed&&<Badge text="Finalizado" variant="success"/>}

      <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:extra||onAction?14:0}}>

function AdminDashboard({navigate,tick}) {
  const events=DB.events(),teachers=DB.teachers(),regs=DB.regs(),atts=DB.atts();
  const upcoming=events.filter(e=>!isPast(e.fecha));
  const todayEvs=events.filter(e=>isToday(e.fecha));
  const cfg=getSPConfig();

  return <div className="fade-in">
    <PageHeader title="Dashboard" subtitle="Resumen general del sistema de capacitaciones"/>
    {cfg.mode==='googlesheets'&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20,
      padding:'8px 14px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,fontSize:13,color:'#15803D'}}>
      <Icon name="wifi" size={14}/> Google Sheets activo — datos sincronizados en tiempo real
    </div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:16,marginBottom:32}}>
      <StatCard label="Docentes registrados"   value={teachers.length} icon="users"    color="#1E3A8A"/>
      <StatCard label="Eventos activos"         value={upcoming.length} icon="calendar" color="#0D9488"/>
      <StatCard label="Inscripciones totales"   value={regs.length}     icon="clip"     color="#7C3AED"/>
      <StatCard label="Asistencias confirmadas" value={atts.length}     icon="checkc"   color="#15803D"/>
    </div>
    {todayEvs.length>0&&<div style={{marginBottom:28}}>
      <h2 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Eventos de hoy</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
        {todayEvs.map(e=><EventCard key={e.id} event={e} actionLabel="Registrar asistencia"
          actionVariant="accent" onAction={()=>navigate('a-evento',e.id,'checkin')}/>)}
      </div>
    </div>}
    <h2 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Próximos eventos</h2>
    <Card p={0}>
      <Table cols={['Nombre','Tipo','Fecha','Lugar','Inscritos / Cupos']}
        empty={<Empty icon="calendar" title="Sin eventos próximos"/>}
        rows={events.filter(e=>isUpcoming(e.fecha)).sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>{
          const cnt=DB.eventRegs(e.id).length;
          return <tr key={e.id} style={{cursor:'pointer'}}
            onMouseEnter={ev=>ev.currentTarget.style.background='#F8FAFC'}
            onMouseLeave={ev=>ev.currentTarget.style.background=''}
            onClick={()=>navigate('a-evento',e.id)}>
            <Td><span style={{fontWeight:600,color:'#0F172A'}}>{e.nombre}</span></Td>
            <Td><Badge text={e.tipo}/></Td>
            <Td>{fmtDate(e.fecha)}</Td>
            <Td>{e.lugar}</Td>
            <Td><span style={{color:cnt>=e.cupos?'#B91C1C':'#475569',fontWeight:500}}>{cnt}/{e.cupos}</span></Td>
          </tr>;
        })}/>
    </Card>
  </div>;
}

function EventEditModal({open,onClose,onSave,event}) {
  const toStr = v => v===undefined||v===null?'':String(v);
  const [f,setF]=useState({});
  const [err,setErr]=useState({});
  useEffect(()=>{
    if(open&&event) setF({
      nombre:toStr(event.nombre), tipo:toStr(event.tipo)||'Acompañamiento',
      fecha:toStr(event.fecha), hora:toStr(event.hora)||'09:00',
      duracion:toStr(event.duracion)||'60', lugar:toStr(event.lugar),
      cupos:toStr(event.cupos), relator:toStr(event.relator),
      descripcion:toStr(event.descripcion),
      estadoPublicacion:toStr(event.estadoPublicacion)||'Abierto',
      fechaApertura:toStr(event.fechaApertura)||''
    });
  },[open,event]);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  async function save() {
    const e={};
    if(!f.nombre)e.nombre='Requerido';if(!f.fecha)e.fecha='Requerido';
    if(!f.lugar)e.lugar='Requerido';if(!f.relator)e.relator='Requerido';
    if(!f.cupos||isNaN(+f.cupos))e.cupos='Número válido';
    if(Object.keys(e).length){setErr(e);return;}
    const evData={...event,...f,cupos:+f.cupos,duracion:+f.duracion||60};
    const cfg=getSPConfig();
    if(cfg.mode==='googlesheets') await GS.updateEvento(evData);
    DB.updateEvent(evData);
    onSave();setErr({});
  }
  if(!event) return null;
  return <Modal open={open} onClose={onClose} title="Editar evento" width={620}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <Field label="Nombre" required error={err.nombre} style={{gridColumn:'1/-1'}}>
        <TInput value={f.nombre||''} onChange={e=>upd('nombre',e.target.value)} placeholder="Ej: Taller de Innovación Pedagógica"/>
      </Field>
      <Field label="Tipo"><SInput value={f.tipo||'Acompañamiento'} onChange={e=>upd('tipo',e.target.value)} options={['Acompañamiento','Charla','Congreso','Curso','Otro','Seminario','Taller']}/></Field>
      <Field label="Cupos" required error={err.cupos}><TInput value={f.cupos||''} onChange={e=>upd('cupos',e.target.value)} type="number" placeholder="30"/></Field>
      <Field label="Fecha" required error={err.fecha}><TInput value={f.fecha||''} onChange={e=>upd('fecha',e.target.value)} type="date"/></Field>
      <Field label="Hora (24h)"><HoraInput value={f.hora||'09:00'} onChange={v=>upd('hora',v)}/></Field>
      <Field label="Duración">

function EventFormModal({open,onClose,onSave}) {
  const empty={nombre:'',tipo:'Acompañamiento',fecha:'',hora:'09:00',duracion:'60',lugar:'',cupos:'',relator:'',descripcion:'',estadoPublicacion:'Borrador',fechaApertura:''};
  const [f,setF]=useState(empty);
  const [err,setErr]=useState({});
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  async function save() {
    const e={};
    if(!f.nombre)e.nombre='Requerido';if(!f.fecha)e.fecha='Requerido';
    if(!f.lugar)e.lugar='Requerido';if(!f.relator)e.relator='Requerido';
    if(!f.cupos||isNaN(+f.cupos))e.cupos='Número válido';
    if(Object.keys(e).length){setErr(e);return;}
    // Generate ID here so GS and localStorage share the same one
    const newId = 'e-' + Math.random().toString(36).slice(2,9);
    const evData = {...f, cupos:+f.cupos, id:newId};
    const cfg=getSPConfig();
    if(cfg.mode==='googlesheets') await GS.addEvento(evData);
    DB.addEvent(evData);
    onSave();setF(empty);setErr({});

      <Field label="Cupos" required error={err.cupos}><TInput value={f.cupos} onChange={e=>upd('cupos',e.target.value)} type="number" placeholder="30"/></Field>
      <Field label="Fecha" required error={err.fecha}><TInput value={f.fecha} onChange={e=>upd('fecha',e.target.value)} type="date"/></Field>
      <Field label="Hora (24h)"><HoraInput value={f.hora} onChange={v=>upd('hora',v)}/></Field>
      <Field label="Duración">
        <SInput value={f.duracion} onChange={e=>upd('duracion',e.target.value)}
          options={[{v:'30',l:'30 min'},{v:'45',l:'45 min'},{v:'60',l:'1 hora'},{v:'90',l:'1 h 30 min'},{v:'120',l:'2 horas'},{v:'180',l:'3 horas'},{v:'240',l:'4 horas'}]}/>
      </Field>
      <Field label="Lugar" required error={err.lugar} style={{gridColumn:'1/-1'}}>
        <TInput value={f.lugar} onChange={e=>upd('lugar',e.target.value)} placeholder="Sala A101, Edificio Académico"/>
      </Field>
      <Field label="Relator" required error={err.relator} style={{gridColumn:'1/-1'}}>
        <TInput value={f.relator} onChange={e=>upd('relator',e.target.value)} placeholder="Dr. Nombre Apellido"/>
      </Field>

      <Field label="Descripción" style={{gridColumn:'1/-1'}}>
        <TArea value={f.descripcion} onChange={e=>upd('descripcion',e.target.value)} placeholder="Objetivos y metodología del evento…"/>
      </Field>
      <Field label="Estado de publicación" hint="Borrador: solo admin. Publicado: visible pero sin inscripción. Abierto: inscripción habilitada.">
        <SInput value={f.estadoPublicacion} onChange={e=>upd('estadoPublicacion',e.target.value)}
          options={[{v:'Borrador',l:'Borrador — solo visible para el admin'},{v:'Publicado',l:'Publicado — visible sin inscripción'},{v:'Abierto',l:'Abierto — inscripción habilitada'}]}/>
      </Field>
      <Field label="Apertura automática (opcional)" hint="Fecha en que se habilitará la inscripción automáticamente">

const PAST_LIMIT = 5; // number of past events to show before collapsing

function AdminEventos({navigate,tick,setTick}) {
  const [showForm,setShowForm]=useState(false);
  const [filter,setFilter]=useState('all');
  const [q,setQ]=useState('');
  const [showAllPast,setShowAllPast]=useState(false);
  const events=DB.events();

  const byFilter=events.filter(e=>filter==='upcoming'?isUpcoming(e.fecha)&&!isToday(e.fecha):filter==='today'?isToday(e.fecha):filter==='past'?(isPast(e.fecha)||DB.isClosed(e.id)):true);
  const bySearch=!q.trim()?byFilter:byFilter.filter(e=>{
    const ql=q.toLowerCase();
    return e.nombre.toLowerCase().includes(ql)||e.tipo.toLowerCase().includes(ql)||
      (e.lugar||'').toLowerCase().includes(ql)||(e.relator||'').toLowerCase().includes(ql)||
      (e.fecha||'').includes(ql)||(e.fecha||'').slice(0,4).includes(ql);
  });
  const sorted=bySearch.sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const isPastFilter=filter==='past'||(filter==='all'&&!q.trim());
  const pastInAll=sorted.filter(e=>isPast(e.fecha));
  const nonPast=sorted.filter(e=>!isPast(e.fecha));
  let displayed=sorted;
  let pastHidden=0;
  if(filter==='all'&&!q.trim()&&!showAllPast&&pastInAll.length>PAST_LIMIT) {
    pastHidden=pastInAll.length-PAST_LIMIT;
    displayed=[...nonPast,...pastInAll.slice(0,PAST_LIMIT)];
  }
  if(filter==='past'&&!q.trim()&&!showAllPast&&sorted.length>PAST_LIMIT) {
    pastHidden=sorted.length-PAST_LIMIT;
    displayed=sorted.slice(0,PAST_LIMIT);
  }

  return <div className="fade-in">
    <PageHeader title="Eventos" subtitle={`${events.length} eventos en el sistema`}
      action={<Btn onClick={()=>setShowForm(true)}><Icon name="plus" size={16}/>Nuevo evento</Btn>}/>
    <FilterPills value={filter} onChange={v=>{setFilter(v);setQ('');setShowAllPast(false);}}
      options={[['all','Todos'],['upcoming','Próximos'],['today','Hoy'],['past','Realizados']]}/>
    <div style={{display:'flex',gap:10,marginBottom:20,alignItems:'center'}}>
      <div style={{position:'relative',flex:1,maxWidth:400}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#94A3B8',pointerEvents:'none'}}>
          <Icon name="search" size={15}/>
        </div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por nombre, tipo, relator, año…"
          style={{paddingLeft:38,padding:'9px 12px 9px 38px',borderRadius:8,border:'1px solid #E2E8F0',
            fontSize:13,fontFamily:'inherit',background:'#fff',outline:'none',width:'100%',color:'#0F172A'}}/>
      </div>
      {q&&<span style={{fontSize:12,color:'#94A3B8',whiteSpace:'nowrap'}}>{bySearch.length} resultado{bySearch.length!==1?'s':''}</span>}
    </div>
    {displayed.length===0
      ? <Empty icon="calendar" title="Sin eventos en esta categoría" subtitle="Prueba otro filtro o crea un evento nuevo"/>
      : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:16}}>
          {displayed.map(e=>{
            const ep=e.estadoPublicacion||'Abierto';
            return <div key={e.id} style={{display:'flex',flexDirection:'column',gap:6}}>
              <EventCard event={e} onClick={()=>navigate('a-evento',e.id)}
                showPubState={true}
                actionLabel={isToday(e.fecha)?'Registrar asistencia':'Ver detalles'}
                actionVariant={isToday(e.fecha)?'accent':'secondary'}
                onAction={()=>navigate('a-evento',e.id)}/>
              {/* Botones de cambio rápido de estado de publicación */}
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {ep!=='Borrador'  && <button onClick={()=>{DB.setEstadoPublicacion(e.id,'Borrador');  GS.updateEvento&&getSPConfig().gsUrl&&GS.updateEvento({...e,estadoPublicacion:'Borrador'}).catch(()=>{}); setTick(t=>t+1);}} style={{flex:1,fontSize:11,fontWeight:600,padding:'5px 8px',borderRadius:6,cursor:'pointer',border:'1px solid #E2E8F0',background:'#F8FAFC',color:'#64748B',fontFamily:'inherit'}}>→ Borrador</button>}
                {ep!=='Publicado' && <button onClick={()=>{DB.setEstadoPublicacion(e.id,'Publicado'); getSPConfig().gsUrl&&GS.updateEvento({...e,estadoPublicacion:'Publicado'}).catch(()=>{}); setTick(t=>t+1);}} style={{flex:1,fontSize:11,fontWeight:600,padding:'5px 8px',borderRadius:6,cursor:'pointer',border:'1px solid #BFDBFE',background:'#EFF6FF',color:'#1D4ED8',fontFamily:'inherit'}}>→ Publicado</button>}
                {ep!=='Abierto'   && <button onClick={()=>{DB.setEstadoPublicacion(e.id,'Abierto');   getSPConfig().gsUrl&&GS.updateEvento({...e,estadoPublicacion:'Abierto'}).catch(()=>{}); setTick(t=>t+1);}} style={{flex:1,fontSize:11,fontWeight:600,padding:'5px 8px',borderRadius:6,cursor:'pointer',border:'1px solid #BBF7D0',background:'#F0FDF4',color:'#15803D',fontFamily:'inherit'}}>→ Abierto</button>}
              </div>
            </div>;
          })}
        </div>}
    {pastHidden>0&&<div style={{textAlign:'center',marginTop:20}}>
      <button onClick={()=>setShowAllPast(true)} style={{background:'none',border:'1px solid #E2E8F0',
        borderRadius:8,padding:'8px 20px',cursor:'pointer',fontFamily:'inherit',fontSize:13,
        color:'#64748B',fontWeight:500}}>
        Ver {pastHidden} actividad{pastHidden!==1?'es':''} pasada{pastHidden!==1?'s':''} más
      </button>
    </div>}
    <EventFormModal open={showForm} onClose={()=>setShowForm(false)}
      onSave={()=>{setTick(t=>t+1);setShowForm(false);}}/>
  </div>;
}

function AdminEventoDetail({eventId,initTab,navigate,tick,setTick}) {
  const [tab,setTab]=useState(initTab||'inscritos');
  const [checkinRut,setCheckinRut]=useState('');
  const [checkinMsg,setCheckinMsg]=useState(null);
  const [confirmDel,setConfirmDel]=useState(false);
  const [showEdit,setShowEdit]=useState(false);
  const event=DB.event(eventId);
  if(!event) return <Empty icon="calendar" title="Evento no encontrado"/>;
  const now=useNow();
  const regs=DB.eventRegs(eventId),atts=DB.eventAtts(eventId);
  const canCheck=isPast(event.fecha)||isToday(event.fecha);

  async function handleCheckin() {
    const rut=checkinRut.trim();if(!rut)return;
    if(!validarRut(rut)){setCheckinMsg({type:'danger',text:'RUT inválido. Verifica el número y el dígito verificador.',teacher:null});return;}
    const cfg=getSPConfig();
    const teacher=DB.findTeacher(rut),isReg=DB.isReg(eventId,rut),hasAtt=DB.hasAtt(eventId,rut);
    if(hasAtt){setCheckinMsg({type:'warning',text:'Ya tiene asistencia registrada.',teacher});return;}
    if(!isReg){setCheckinMsg({type:'danger',text:'No está inscrito en este evento.',teacher});return;}
    if(cfg.mode==='googlesheets') {
      await GS.addAsistencia({id:'a-'+Date.now(),eid:eventId,rut});
      GS.addLog('checkin_admin', 'Admin', eventId, `Check-in: ${teacher?.nombre||rut} en "${event.nombre}"`).catch(()=>{});
    }
    DB.markAtt(eventId,rut);setTick(t=>t+1);
    setCheckinMsg({type:'success',text:'¡Asistencia registrada!',teacher:teacher||{nombre:rut,especialidad:''}});
    setCheckinRut('');
  }

  async function handleDelete() {
    const cfg=getSPConfig();
    if(cfg.mode==='googlesheets') await GS.deleteEvento(eventId);
    DB.deleteEvent(eventId);setTick(t=>t+1);navigate('a-eventos');
  }

  function exportAsistencia() {
    const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const inscritos = regs.map(r => {
      const t = DB.findTeacher(r.rut)||{nombre:r.rut,especialidad:'—',email:'—'};
      const asistio = DB.hasAtt(eventId,r.rut);
      return `<tr>
        <td style="padding:10px 14px;border-bottom:1px solid #F1F5F9;font-weight:600">${esc(t.nombre)}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #F1F5F9;color:#64748B">${esc(t.especialidad)}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #F1F5F9;color:#64748B">${esc(t.email)}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #F1F5F9;text-align:center;font-weight:700;color:${asistio?'#15803D':'#94A3B8'}">${asistio?'✓ Asistió':'—'}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #F1F5F9"></td>
      </tr>`;
    }).join('');
    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
      <title>Asistencia — ${esc(event.nombre)}</title>
      <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#0F172A;padding:36px;font-size:13px}
      .header{border-bottom:3px solid #1E3A8A;padding-bottom:18px;margin-bottom:24px}
      h1{font-size:20px;font-weight:800;color:#1E3A8A;margin-bottom:6px}
      .meta{display:flex;gap:24px;font-size:12px;color:#64748B;margin-bottom:16px}
      .stats{display:flex;gap:12px;margin-bottom:24px}
      .stat{background:#F8FAFC;border-radius:8px;padding:12px 18px;flex:1;text-align:center}
      .stat-n{font-size:22px;font-weight:800;color:#1E3A8A}.stat-l{font-size:11px;color:#64748B}
      table{width:100%;border-collapse:collapse}
      th{background:#1E3A8A;color:#fff;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase}
      .footer{margin-top:28px;font-size:11px;color:#94A3B8;display:flex;justify-content:space-between;border-top:1px solid #E2E8F0;padding-top:12px}
      @media print{body{padding:18px}@page{margin:12mm}}</style></head>
      <body>
      <div class="header">
        <div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Lista de Asistencia</div>
        <h1>${esc(event.nombre)}</h1>
      </div>
      <div class="meta">
        <span>📅 ${esc(fmtDateL(event.fecha))} · ${esc(fmtHora(event.hora))}h</span>
        <span>📍 ${esc(event.lugar)}</span>
        <span>👤 ${esc(event.relator)}</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n">${regs.length}</div><div class="stat-l">Inscritos</div></div>
        <div class="stat"><div class="stat-n">${atts.length}</div><div class="stat-l">Asistencias</div></div>
        <div class="stat"><div class="stat-n">${regs.length>0?Math.round(atts.length/regs.length*100):0}%</div><div class="stat-l">Tasa</div></div>
        <div class="stat"><div class="stat-n">${event.cupos-regs.length}</div><div class="stat-l">Cupos libres</div></div>
      </div>
      <table><thead><tr><th>Nombre</th><th>Decanato / Área</th><th>Correo</th><th style="text-align:center">Asistencia</th><th>Firma</th></tr></thead>
      <tbody>${inscritos}</tbody></table>
      <div class="footer"><span>Generada el ${esc(fmtDateL(TODAY))}</span><span>Sistema de Capacitaciones Docentes</span></div>
      ${'<scr'+'ipt>'}window.onload=function(){setTimeout(function(){window.print();},400);}${'</scr'+'ipt>'}
      </body></html>`;
    const win = window.open('','_blank');
    if(!win){ alert('El navegador bloqueó la ventana. Permite ventanas emergentes e intenta de nuevo.'); return; }
    win.document.open(); win.document.write(html); win.document.close();
  }

  const isClosed = DB.isClosed(eventId);

    ...(canCheck&&!isClosed?[{id:'checkin',label:'Check-in kiosco'}]:[]),
    {id:'exportar',label:'Exportar'}];  const msgC={success:['#DCFCE7','#15803D'],warning:['#FEF3C7','#B45309'],danger:['#FEE2E2','#B91C1C']};

  return <div className="fade-in">
    <PageHeader back="Volver a Eventos" onBack={()=>navigate('a-eventos')} title={event.nombre}

          <div style={{fontWeight:700,marginBottom:6,color:'#475569'}}>El documento incluye:</div>

function AdminDocentes({navigate,tick,setTick}) {
  const [q,setQ]=useState('');
  const [statusFilter,setStatusFilter]=useState('todos');
  const teachers=DB.teachers();
  const pendingCount = teachers.filter(t=>(t.estado||'activo')==='pendiente').length;
  const filtered=teachers
    .filter(t=>statusFilter==='pendiente'?(t.estado||'activo')==='pendiente':statusFilter==='activo'?(t.estado||'activo')==='activo':true)
    .filter(t=>!q||t.nombre.toLowerCase().includes(q.toLowerCase())||t.rut.includes(q)||(t.especialidad||'').toLowerCase().includes(q.toLowerCase()));

  async function aprobar(rut) {
    const t = DB.findTeacher(rut);
    if(!t) return;
    const updated = {...t, estado:'activo'};
    // Guardar en localStorage correctamente
    const lista = DB.teachers().map(x => DB.sameRut(x.rut, rut) ? updated : x);
    localStorage.setItem('cap_teachers', JSON.stringify(lista));
    // Sincronizar a GS
    const cfg = getSPConfig();
    if(cfg.mode==='googlesheets') GS.updateDocente(updated).catch(()=>{});
    // Forzar re-render del componente
    if(setTick) setTick(t=>t+1);
  }

  return <div className="fade-in">
    <PageHeader title="Docentes" subtitle={`${teachers.length} docentes en el sistema`}/>
    {pendingCount>0&&<div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:10,

      <Icon name="warn" size={16}/>

      <button onClick={()=>setStatusFilter('pendiente')} style={{marginLeft:'auto',background:'#F97316',color:'#fff',
        border:'none',borderRadius:6,padding:'4px 12px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
        Ver pendientes

      {[['todos','Todos'],['activo','Activos'],['pendiente','Pendientes']].map(([v,l])=>(
        <button key={v} onClick={()=>setStatusFilter(v)} style={{padding:'6px 14px',borderRadius:20,fontSize:13,
          fontWeight:500,cursor:'pointer',fontFamily:'inherit',border:`1px solid ${statusFilter===v?'#1E3A8A':'#E2E8F0'}`,
          background:statusFilter===v?'#1E3A8A':'#fff',color:statusFilter===v?'#fff':'#64748B',transition:'all .12s'}}>

/* ════════════════════════════════════════════════════════════════
   DOCENTE VIEWS
   ════════════════════════════════════════════════════════════════ */
function DocenteEventos({rut,tick,setTick}) {
  const [filter,setFilter]=useState('all');
  const [showForm,setShowForm]=useState(null);
  const [regForm,setRegForm]=useState({nombre:'',email:'',especialidad:''});
  const teacher=DB.findTeacher(rut),events=DB.events();
  const sysConfig   = getSysConfig();
  const MAX_POR_DIA = parseInt(sysConfig.max_inscripciones_dia||'3', 10);
  const AVISO_CUPOS = parseInt(sysConfig.aviso_cupos_bajos||'20', 10) / 100;

  // Docentes nunca ven Borradores
  const visibles = events.filter(e => (e.estadoPublicacion||'Abierto') !== 'Borrador');
  const filtered = visibles
    .filter(e=>filter==='today'?isToday(e.fecha):filter==='upcoming'?isUpcoming(e.fecha)&&!isToday(e.fecha):true)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Inscripciones del docente agrupadas por fecha
  const regsByDate = {};
  DB.teacherRegs(rut).forEach(r => {
    const ev = events.find(e=>e.id===r.eid);
    if(ev&&ev.fecha) regsByDate[ev.fecha] = (regsByDate[ev.fecha]||0) + 1;
  });

  async function tryRegister(event) {
    if((event.estadoPublicacion||'Abierto') !== 'Abierto') return;
    const lockKey = 'reg_lock_' + event.id + '_' + rut;
    if(sessionStorage.getItem(lockKey)) return;
    if(DB.isReg(event.id,rut)) return;
    if(DB.eventRegs(event.id).length >= event.cupos) return;
    if((regsByDate[event.fecha]||0) >= MAX_POR_DIA) {
      alert(`Ya tienes ${MAX_POR_DIA} inscripción${MAX_POR_DIA!==1?'es':''} para el ${fmtDateL(event.fecha)}. No puedes inscribirte en más eventos ese día.`);
      return;
    }
    sessionStorage.setItem(lockKey, '1');
    try {
      if(DB.eventRegs(event.id).length >= event.cupos) { setTick(t=>t+1); return; }
      const cfg=getSPConfig();
      if(teacher) {
        if(cfg.mode==='googlesheets') {
          const regId = 'r-' + Date.now();
          // GS.inscribir usa LockService en el servidor y devuelve respuesta confirmada
          const result = await GS.inscribir(event.id, rut, regId);
          if(result.ok === false) {
            // Respuesta definitiva del servidor: no registrar localmente
            if(result.error === 'sin_cupos') {
              setTick(t=>t+1); // refresca UI para reflejar cupos reales
              alert('Lo sentimos, el evento ya no tiene cupos disponibles.');
              return;
            }
            if(result.error === 'ya_inscrito') {
              // El servidor ya lo tiene; sincronizar localmente y salir
              DB.register(event.id, rut); setTick(t=>t+1); return;
            }
            // lock_timeout u otro error de servidor: registrar localmente (optimista)
          }
          // ok:true → confirmado | ok:null → fallback CORS → optimista
          GS.addLog('inscripcion', rut, event.id,
            `${teacher.nombre||rut} se inscribió en "${event.nombre}"`).catch(()=>{});
        }
        DB.register(event.id,rut); setTick(t=>t+1);
      } else { setRegForm({nombre:'',email:'',especialidad:''}); setShowForm(event); }
    } finally { sessionStorage.removeItem(lockKey); }
  }

  async function confirmRegister() {
    if(!showForm) return;
    const lockKey = 'reg_lock_' + showForm.id + '_' + rut;
    if(sessionStorage.getItem(lockKey)) return;
    if(DB.eventRegs(showForm.id).length >= showForm.cupos) {
      setShowForm(null); alert('Lo sentimos, el evento se llenó mientras completabas el formulario.'); return;
    }
    sessionStorage.setItem(lockKey, '1');
    try {
      if(DB.eventRegs(showForm.id).length >= showForm.cupos) {
        setShowForm(null); alert('Lo sentimos, el evento se llenó mientras completabas el formulario.'); return;
      }
      const cfg=getSPConfig();
      if(!DB.findTeacher(rut)) {
        if(cfg.mode==='googlesheets') await GS.addDocente({rut,...regForm});
        DB.addTeacher({rut,...regForm});
      }
      if(cfg.mode==='googlesheets') {
        const regId = 'r-' + Date.now();
        const result = await GS.inscribir(showForm.id, rut, regId);
        if(result.ok === false) {
          if(result.error === 'sin_cupos') {
            setShowForm(null); setTick(t=>t+1);
            alert('Lo sentimos, el evento ya no tiene cupos disponibles.');
            return;
          }
          // ya_inscrito u otros: sincronizar localmente
        }
        GS.addLog('inscripcion', rut, showForm.id,
          `${regForm.nombre||rut} se inscribió en "${showForm.nombre}" (nuevo docente)`).catch(()=>{});
      }
      DB.register(showForm.id,rut); setTick(t=>t+1); setShowForm(null);
    } finally { sessionStorage.removeItem(lockKey); }
  }

  return <div className="fade-in">
    <PageHeader title="Eventos disponibles" subtitle="Inscríbete a las capacitaciones abiertas"/>
    <FilterPills value={filter} onChange={setFilter} options={[['upcoming','Próximos'],['today','Hoy'],['all','Todos']]}/>
    {filtered.length===0
      ? <Empty icon="calendar" title="Sin eventos en esta categoría" subtitle="Revisa otro filtro o vuelve más tarde"/>
      : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:16}}>
          {filtered.map(e=>{
            const ep         = e.estadoPublicacion||'Abierto';
            const reg        = DB.isReg(e.id,rut);
            const totalRegs  = DB.eventRegs(e.id).length;
            const full       = totalRegs >= e.cupos;
            const pct        = e.cupos > 0 ? totalRegs / e.cupos : 0;
            const pocosC     = !full && pct >= (1 - AVISO_CUPOS);
            const restantes  = e.cupos - totalRegs;
            const miReg      = DB.teacherRegs(rut).find(r=>r.eid===e.id);
            const modificado = reg && miReg?.registradoAt && e.updatedAt && e.updatedAt > miReg.registradoAt;
            const limiteAlc  = !reg && (regsByDate[e.fecha]||0) >= MAX_POR_DIA;

            // Publicado — visible en gris
            if(ep === 'Publicado') return (
              <div key={e.id} style={{opacity:.7,filter:'grayscale(30%)'}}>
                <EventCard event={e}
                  extra={<div style={{display:'flex',alignItems:'center',gap:7,fontSize:12,
                    color:'#1D4ED8',background:'#EFF6FF',border:'1px solid #BFDBFE',
                    borderRadius:8,padding:'6px 12px',marginBottom:8,fontWeight:500}}>
                    <Icon name="calendar" size={13}/>
                    {e.fechaApertura?`Inscripción disponible desde el ${fmtDateL(e.fechaApertura)}`:'Próximamente — inscripción no disponible aún'}
                  </div>}
                  actionLabel="No disponible aún" actionVariant="ghost"
                  actionDisabled={true} onAction={()=>{}}/>
              </div>
            );

            // Abierto — con indicadores de fase 3
            return <EventCard key={e.id} event={e}
              actionLabel={reg?'Ya inscrito':full?'Sin cupos':limiteAlc?'Límite del día':'Inscribirme'}
              actionVariant={reg?'ghost':full||limiteAlc?'secondary':'primary'}
              actionDisabled={reg||full||limiteAlc}
              onAction={()=>tryRegister(e)}
              extra={<div>
                {reg&&<div style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,
                  color:'#15803D',fontWeight:600,marginBottom:4}}>
                  <Icon name="check" size={13}/>Ya estás inscrito
                </div>}
                {modificado&&<div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,
                  color:'#92400E',background:'#FEF3C7',border:'1px solid #FDE68A',
                  borderRadius:8,padding:'6px 10px',marginBottom:4,lineHeight:1.4}}>
                  <Icon name="warn" size={13}/>Este evento fue modificado después de tu inscripción. Verifica los detalles.
                </div>}
                {pocosC&&!reg&&<div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,
                  color:'#B45309',background:'#FFFBEB',border:'1px solid #FDE68A',
                  borderRadius:8,padding:'5px 10px',marginBottom:4,fontWeight:500}}>
                  <Icon name="warn" size={13}/>¡Solo quedan {restantes} cupo{restantes!==1?'s':''}!
                </div>}
                {limiteAlc&&<div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,
                  color:'#64748B',background:'#F1F5F9',border:'1px solid #CBD5E1',
                  borderRadius:8,padding:'5px 10px',marginBottom:4}}>
                  <Icon name="calendar" size={13}/>Ya tienes {MAX_POR_DIA} evento{MAX_POR_DIA!==1?'s':''} este día
                </div>}
              </div>}/>;
          })}
        </div>}
    <Modal open={!!showForm} onClose={()=>setShowForm(null)} title="Completa tu inscripción">
      <div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:8,padding:'10px 14px',marginBottom:20,fontSize:13,color:'#92400E',lineHeight:1.5}}>
        El RUT <strong>{rut}</strong> no está en el registro. Completa tus datos — se guardarán para futuros eventos.
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Field label="Nombre completo" required><TInput value={regForm.nombre} onChange={e=>setRegForm(p=>({...p,nombre:e.target.value}))} placeholder="Nombre y apellido" autoFocus/></Field>
        <Field label="Correo electrónico" required><TInput value={regForm.email} onChange={e=>setRegForm(p=>({...p,email:e.target.value}))} type="email" placeholder="correo@ejemplo.cl"/></Field>
        <Field label="Decanato / Área" required>
          <SInput value={regForm.especialidad} onChange={e=>setRegForm(p=>({...p,especialidad:e.target.value}))} options={FACULTADES} placeholder="Selecciona…"/>
        </Field>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
        <Btn variant="ghost" onClick={()=>setShowForm(null)}>Cancelar</Btn>
        <Btn onClick={confirmRegister} disabled={!regForm.nombre||!regForm.email||!regForm.especialidad}>Confirmar inscripción</Btn>
      </div>
    </Modal>
  </div>;
}

function DocenteInscripciones({rut,tick,setTick}) {
  const regs=DB.teacherRegs(rut),events=DB.events();
  const items=regs.map(r=>{const ev=events.find(e=>e.id===r.eid);const att=DB.hasAtt(r.eid,rut);return ev?{...ev,reg:r,att}:null;}).filter(Boolean).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const [checkinId,setCheckinId]=React.useState(null);
  const [checkinOk,setCheckinOk]=React.useState({});
  const [confirmCancel,setConfirmCancel]=React.useState(null); // eventId a cancelar
  const nowT=useNow();

  async function cancelar(eventId) {
    const cfg=getSPConfig();
    const ev=DB.events().find(e=>e.id===eventId);
    if(cfg.mode==='googlesheets') {
      const reg=DB.teacherRegs(rut).find(r=>r.eid===eventId);
      await GS.cancelInscripcion(eventId,rut,reg&&reg.id,reg&&reg.fecha);
      GS.addLog('cancelacion', rut, eventId, `${rut} canceló inscripción en "${ev?.nombre||eventId}"`).catch(()=>{});
    }
    DB.unregister(eventId,rut);
    setConfirmCancel(null);
    setTick(t=>t+1);
  }

  async function confirmarAsistencia(eventId) {
    if(DB.hasAtt(eventId,rut)) return;
    const ev = DB.event(eventId);
    if(!ev || !isCheckInOpen(ev, new Date())) {
      alert('La ventana de registro ya cerró. Contacta al administrador si necesitas registrar tu asistencia.');
      return;
    }
    DB.markAtt(eventId,rut);
    const cfg=getSPConfig();
    if(cfg.mode==='googlesheets'&&cfg.gsUrl) {
      try {
        await GS.addAsistencia({id:'a-'+Date.now(),eid:eventId,rut});
        const ev2=DB.event(eventId);
        GS.addLog('asistencia_auto', rut, eventId, `${rut} confirmó asistencia en "${ev2?.nombre||eventId}"`).catch(()=>{});
      } catch(e){}
    }
    setCheckinOk(p=>({...p,[eventId]:true}));
    setTick(t=>t+1);
  }

  return <div className="fade-in">
    <PageHeader title="Mis inscripciones" subtitle={`${regs.length} evento${regs.length!==1?'s':''} inscrito${regs.length!==1?'s':''}`}/>
    {items.length===0?<Empty icon="calendar" title="Sin inscripciones" subtitle="Ve a Eventos para inscribirte"/>
      :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:16}}>
        {items.map(e=>{
          const showCancel=isUpcoming(e.fecha);
          const showCheckin=isCheckInOpen(e,nowT)&&!e.att&&!checkinOk[e.id];
          const justCheckedIn=checkinOk[e.id];
          return(
          <EventCard key={e.id} event={e}
            extra={<div style={{marginBottom:10}}>
              {(e.att||justCheckedIn)?
                <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:'#15803D',background:'#DCFCE7',padding:'3px 10px',borderRadius:20}}>
                  <Icon name="checkc" size={13}/>Asistencia confirmada
                </span>
              :showCheckin?
                <button onClick={()=>confirmarAsistencia(e.id)} style={{
                  display:'inline-flex',alignItems:'center',gap:6,fontSize:12,fontWeight:700,
                  color:'#1D4ED8',background:'#EFF6FF',border:'1.5px solid #93C5FD',
                  padding:'4px 12px',borderRadius:20,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}
                  onMouseOver={ev=>ev.currentTarget.style.background='#DBEAFE'}
                  onMouseOut={ev=>ev.currentTarget.style.background='#EFF6FF'}>
                  <Icon name="checkc" size={13}/>Confirmar mi asistencia
                </button>
              :isToday(e.fecha)?
                <span style={{fontSize:12,color:'#B45309',fontWeight:500}}>Fuera de ventana horaria</span>
              :isUpcoming(e.fecha)?
                <span style={{fontSize:12,color:'#B45309',fontWeight:500}}>Pendiente de asistencia</span>
              :<span style={{fontSize:12,color:'#B91C1C',fontWeight:500}}>No se registró asistencia</span>}
            </div>}
            actionLabel={showCancel?'Cancelar inscripción':undefined}
            actionVariant="danger"
            onAction={showCancel?()=>setConfirmCancel(e.id):undefined}/>);})}
      </div>}
    <Modal open={!!confirmCancel} onClose={()=>setConfirmCancel(null)} title="Cancelar inscripción" width={400}>
      <div style={{display:'flex',gap:14,marginBottom:20}}>
        <div style={{color:'#B91C1C',flexShrink:0,paddingTop:2}}><Icon name="warn" size={22}/></div>
        <p style={{fontSize:14,color:'#475569',lineHeight:1.6}}>
          ¿Seguro que deseas cancelar tu inscripción en <strong>{items.find(e=>e.id===confirmCancel)?.nombre}</strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
        <Btn variant="ghost" onClick={()=>setConfirmCancel(null)}>Mantener inscripción</Btn>
        <Btn variant="danger" onClick={()=>cancelar(confirmCancel)}><Icon name="trash" size={14}/>Sí, cancelar</Btn>
      </div>
    </Modal>
  </div>;
}

function AdminShell({onLogout}) {
  const [view,setView]=useState(()=>localStorage.getItem('adm_view')||'a-dashboard');
  const [eventId,setEventId]=useState(null);
  const [eventTab,setEventTab]=useState(null);
  const [teacherRut,setTeacherRut]=useState(null);
  const [tick,setTick]=useState(0);
  const [showSettings,setShowSettings]=useState(false);
  const [showMonitor,setShowMonitor]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(()=>localStorage.getItem('cap_last_sync')||null);
  const [staleSync,setStaleSync]=useState(false);

  // Revisa cada minuto si la última sync tiene más de 20 minutos
  useEffect(()=>{
    const cfg=getSPConfig();
    if(cfg.mode!=='googlesheets') return;
    const STALE_MS = 20 * 60 * 1000;
    function check() {
      const ts = localStorage.getItem('cap_last_sync');
      if(!ts) { setStaleSync(true); return; }
      setStaleSync(Date.now() - new Date(ts).getTime() > STALE_MS);
    }
    check();
    const id = setInterval(check, 60 * 1000);
    return () => clearInterval(id);
  },[lastSync]);

  useEffect(()=>{
    const handler=()=>setTick(t=>t+1);
    window.addEventListener('cap:datachange',handler);
    return ()=>window.removeEventListener('cap:datachange',handler);
  },[]);

  function navigate(v,id,tab) {
    setView(v);
    if(id&&v==='a-evento'){setEventId(id);setEventTab(tab||null);}
    if(id&&v==='a-docente') setTeacherRut(id);
    localStorage.setItem('adm_view',v);
  }

  async function handleSync() {
    const cfg=getSPConfig();
    if(cfg.mode!=='googlesheets'||!cfg.gsUrl) return;
    setSyncing(true);
    try {
      await GS.bootstrap();
      const ts=localStorage.getItem('cap_last_sync')||new Date().toISOString();
      setLastSync(ts);
      setStaleSync(false);
      setTick(t=>t+1);
    } catch(e){ console.error('Sync error',e); }
    finally { setSyncing(false); }
  }

  const mainNav=view==='a-evento'?'a-eventos':view==='a-docente'?'a-docentes':view;
  const content=view==='a-dashboard'?<AdminDashboard navigate={navigate} tick={tick}/>
    :view==='a-eventos'?<AdminEventos navigate={navigate} tick={tick} setTick={setTick}/>
    :view==='a-evento'?<AdminEventoDetail eventId={eventId} initTab={eventTab} navigate={navigate} tick={tick} setTick={setTick}/>
    :view==='a-docentes'?<AdminDocentes navigate={navigate} tick={tick} setTick={setTick}/>
    :view==='a-docente'?<AdminDocenteDetail rut={teacherRut} navigate={navigate} tick={tick}/>
    :null;

  return <div style={{display:'flex',minHeight:'100dvh'}}>
    <Sidebar nav={ADMIN_NAV} active={mainNav} onNav={v=>navigate(v)} onLogout={onLogout}
      color="#1E3A8A" subtitle="Administrador" title="Capacitaciones Docentes" isAdmin={true}
      onSettings={()=>setShowSettings(true)} showMonitor={showMonitor}
      onMonitor={DEV_MODE?()=>setShowMonitor(m=>!m):null}
      onSync={handleSync} syncing={syncing} lastSync={lastSync} staleSync={staleSync}/>
    <div style={{flex:1,overflow:'auto'}}>
      {staleSync&&getSPConfig().mode==='googlesheets'&&<div style={{
        background:'#FFF7ED',borderBottom:'1px solid #FED7AA',
        padding:'9px 20px',display:'flex',alignItems:'center',
        justifyContent:'space-between',gap:12,fontSize:13,color:'#92400E'}}>
        <span style={{display:'flex',alignItems:'center',gap:8}}>
          <Icon name="warn" size={15}/>
          {lastSync
            ? `Los datos no se sincronizan hace más de 20 minutos.`
            : 'No se ha realizado ninguna sincronización en esta sesión.'}
          {' '}Pueden existir cambios de otros administradores no reflejados.
        </span>
        <button onClick={handleSync} disabled={syncing} style={{background:'#F97316',color:'#fff',border:'none',
          borderRadius:6,padding:'5px 14px',fontSize:12,fontWeight:700,cursor:syncing?'wait':'pointer',
          fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>
          {syncing?'Sincronizando…':'Sincronizar ahora'}
        </button>
      </div>}
      <div className="main-pad" style={{maxWidth:1140,margin:'0 auto',padding:'32px 28px'}}>{content}</div>
    </div>
    <nav className="mob-nav">
      {ADMIN_NAV.map(n=><button key={n.id} onClick={()=>navigate(n.id)} style={{
        flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,
        background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'4px 0',
        color:mainNav===n.id?'#1E3A8A':'#94A3B8',fontSize:10,fontWeight:600}}>
        <Icon name={n.icon} size={20}/>{n.label}
      </button>)}
      <button onClick={onLogout} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
        gap:3,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'4px 0',
        color:'#94A3B8',fontSize:10,fontWeight:600}}>
        <Icon name="logout" size={20}/>Salir
      </button>
    </nav>
    <SettingsPanel open={showSettings} onClose={()=>setShowSettings(false)}/>
    {showMonitor&&<APIMonitor onClose={()=>setShowMonitor(false)}/>}
  </div>;
}
