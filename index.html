/* ── Login Administrador ── */
function AdminLogin({onSuccess, onBack}) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err,  setErr]  = useState('');

  function handleLogin() {
    const ATT_KEY = 'adm_att';
    const MAX_ATT = 5;
    const LOCKOUT_MS = 5 * 60 * 1000;
    let att = { n: 0, ts: 0 };
    try { att = JSON.parse(sessionStorage.getItem(ATT_KEY) || '{"n":0,"ts":0}'); } catch {}
    const now = Date.now();
    if (att.n >= MAX_ATT) {
      const remaining = Math.ceil((att.ts + LOCKOUT_MS - now) / 60000);
      if (remaining > 0) { setErr(`Demasiados intentos. Espera ${remaining} minuto${remaining!==1?'s':''}.`); return; }
      att = { n: 0, ts: 0 };
    }
    const cfg = getSPConfig();
    const u = cfg.adminUser || 'Admin';
    const p = cfg.adminPass || '123456';
    if(user.trim() === u && pass === p) {
      sessionStorage.setItem(ATT_KEY, JSON.stringify({ n: 0, ts: 0 }));
      onSuccess();
    } else {
      const newAtt = { n: att.n + 1, ts: now };
      sessionStorage.setItem(ATT_KEY, JSON.stringify(newAtt));
      const rem = MAX_ATT - newAtt.n;
      setErr(rem > 0 ? `Usuario o contraseña incorrectos. Te quedan ${rem} intento${rem!==1?'s':''}.` : 'Acceso bloqueado por 5 minutos.');
      setPass('');
    }
  }

  return (
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(135deg,#EFF6FF,#DBEAFE)',padding:20}}>
      <div className="fade-in" style={{background:'#fff',borderRadius:20,padding:'36px 40px',
        width:'100%',maxWidth:400,boxShadow:'0 20px 60px rgba(15,23,42,.10)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',
          display:'flex',alignItems:'center',gap:6,color:'#94A3B8',fontSize:13,
          fontFamily:'inherit',fontWeight:500,marginBottom:28,padding:0}}>
          <Icon name="back" size={15}/>Volver
        </button>
        <div style={{width:52,height:52,borderRadius:14,background:'#EFF6FF',color:'#1E3A8A',
          display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
          <Icon name="brief" size={26}/>
        </div>
        <h1 style={{fontSize:22,fontWeight:800,marginBottom:6}}>Acceso Administrador</h1>
        <p style={{fontSize:13,color:'#64748B',marginBottom:28,lineHeight:1.5}}>
          Ingresa tus credenciales para administrar el sistema.
        </p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Field label="Usuario" required>
            <TInput value={user} onChange={e=>setUser(e.target.value)} placeholder="admin"
              autoFocus onKeyDown={e=>e.key==='Enter'&&document.getElementById('adm-pass')?.focus()}/>
          </Field>
          <Field label="Contraseña" required error={err}>
            <input id="adm-pass" type="password" value={pass}
              onChange={e=>setPass(e.target.value)} placeholder="••••••"
              onKeyDown={e=>e.key==='Enter'&&handleLogin()}
              style={{padding:'9px 12px',borderRadius:8,border:'1px solid #E2E8F0',
              fontSize:14,fontFamily:'inherit',outline:'none',width:'100%',color:'#0F172A'}}/>
          </Field>
        </div>
        {err&&<div style={{fontSize:12,color:'#EF4444',marginTop:8}}>{err}</div>}
        <Btn onClick={handleLogin} full size="lg" style={{marginTop:20,background:'#1E3A8A'}}>
          Ingresar
        </Btn>
      </div>
    </div>
  );
}

/* ── Login Docente ── */
function DocenteLogin({onSuccess, onBack}) {
  const [step,    setStep]   = useState('buscar');
  const [input,   setInput]  = useState('');
  const [pin,     setPin]    = useState('');
  const [pin2,    setPin2]   = useState('');
  const [found,   setFound]  = useState(null);
  const [loading, setLoading]= useState(false);
  const [error,   setError]  = useState('');
  const [form,    setForm]   = useState({nombre:'',email:'',especialidad:'',pin:'',pin2:''});
  const cfg = getSPConfig();

  async function handleFind() {
    const q = input.trim();
    if(!q){ setError('Ingresa tu RUT o correo institucional'); return; }
    // Validar formato RUT si no es correo
    if(!q.includes('@')) {
      const cleanRut = q.replace(/[^0-9kK]/g,'');
      if(cleanRut.length >= 2 && !validarRut(q)) {
        setError('RUT inválido. Verifica el número y el dígito verificador (ej: 12.345.678-9).');
        return;
      }
    }
    setError(''); setLoading(true);
    let teacher = null;
    try {
      if(cfg.mode==='googlesheets' && cfg.gsUrl) {
        teacher = await GS.findDocente(q);
      } else {
        const all = DB.teachers();
        const qn  = q.toLowerCase().replace(/[.\s]/g,'');
        teacher = all.find(t =>
          (t.rut||'').replace(/[.\s]/g,'').toLowerCase() === qn ||
          (t.email||'').toLowerCase() === q.toLowerCase()
        ) || null;
      }
    } catch(e) {
      setLoading(false);
      setError('Error al conectar con Google Sheets. Verifica tu conexión.');
      return;
    }
    setLoading(false);
    if(teacher) {
      setFound(teacher);
      if(!DB.findTeacher(teacher.rut)) DB.addTeacher(teacher);
      if(teacher.pin) { setStep('pin'); }
      else            { setStep('setup-pin'); }
    } else {
      // Not found in GS → check if looks like a valid RUT to register as new
      const cleanRut = q.replace(/[^0-9kK]/g,'');
      if(cleanRut.length >= 7 && validarRut(q)) {
        setFound({ rut:formatRut(q), nombre:'', email:'', especialidad:'', pin:'' });
        setStep('nuevo');
      } else {
        setError(q.includes('@')
          ? 'No encontramos ese correo. Verifica e intenta de nuevo.'
          : 'No encontramos ese RUT. Verifica e intenta de nuevo.');
      }
    }
  }

  const PIN_MAX = 3;
  const PIN_LOCKOUT_MS = 5 * 60 * 1000;
  function getPinAtt(rut){ try{ return JSON.parse(sessionStorage.getItem('pin_att_'+rut)||'{"n":0,"ts":0}'); }catch{ return {n:0,ts:0}; } }
  function setPinAtt(rut,d){ sessionStorage.setItem('pin_att_'+rut, JSON.stringify(d)); }

  async function handlePin() {
    const att = getPinAtt(found.rut);
    const now = Date.now();
    if(att.n >= PIN_MAX) {
      const remaining = Math.ceil((att.ts + PIN_LOCKOUT_MS - now) / 60000);
      if(remaining > 0){ setError(`Demasiados intentos. Espera ${remaining} minuto${remaining!==1?'s':''}.`); return; }
      setPinAtt(found.rut, {n:0,ts:0});
    }
    const fresh = DB.findTeacher(found.rut);
    const storedPin = String((fresh && fresh.pin) ? fresh.pin : (found.pin || ''));
    const entered   = String(pin || '').trim();
    const ok = entered ? await verifyPin(entered, storedPin) : false;
    if(ok) {
      setPinAtt(found.rut, {n:0,ts:0});
      onSuccess(found.rut);
    } else {
      const newAtt = { n: att.n + 1, ts: now };
      setPinAtt(found.rut, newAtt);
      const rem = PIN_MAX - newAtt.n;
      setError(rem > 0 ? `PIN incorrecto. Te quedan ${rem} intento${rem!==1?'s':''}.` : 'PIN bloqueado por 5 minutos por seguridad.');
      setPin('');
    }
  }

  async function handleSetupPin() {
    if(pin && pin !== pin2){ setError('Los PINs no coinciden'); return; }
    const pinToStore = pin ? await hashPin(pin) : '';
    // Persistir localmente (siempre funciona)
    const teachers = DB.teachers().map(t => DB.sameRut(t.rut, found.rut) ? { ...t, pin: pinToStore } : t);
    // Si el docente no estaba en localStorage, agregarlo
    if(!DB.findTeacher(found.rut)) teachers.push({...found, pin: pinToStore});
    localStorage.setItem('cap_teachers', JSON.stringify(teachers));
    // Sync a GS (fire-and-forget, no bloquea)
    if(pinToStore && cfg.mode==='googlesheets' && cfg.gsUrl) {
      GS.updateDocente({...found, pin: pinToStore}).catch(()=>{});
    }
    onSuccess(found.rut);
  }

  async function handleNuevo() {
    if(!form.nombre){ setError('El nombre es requerido'); return; }
    if(form.pin && form.pin !== form.pin2){ setError('Los PINs no coinciden'); return; }
    // Validación opcional de dominio institucional
    const sysConf = getSysConfig();
    const dominio = (sysConf.dominio_email || '').trim();
    if(dominio && form.email && !form.email.toLowerCase().endsWith(dominio.toLowerCase())) {
      setError(`El correo debe pertenecer al dominio ${dominio}`);
      return;
    }
    const pinToStore = form.pin ? await hashPin(form.pin) : '';
    const teacher = { rut:found.rut, nombre:form.nombre, email:form.email, especialidad:form.especialidad, pin: pinToStore };
    // Persistir localmente primero (confiable)
    DB.addTeacher(teacher);
    // Sync a GS en background (no bloquea el ingreso)
    if(cfg.mode==='googlesheets' && cfg.gsUrl) GS.addDocente(teacher).catch(()=>{});
    onSuccess(found.rut);
  }

  const WelcomeCard = () => found ? (
    <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,
      padding:'12px 16px',marginBottom:22}}>
      <div style={{fontSize:14,fontWeight:700,color:'#0F172A'}}>{found.nombre}</div>
      <div style={{fontSize:12,color:'#64748B',marginTop:2}}>
        {found.rut}{found.especialidad ? ` · ${found.especialidad}` : ''}
      </div>
    </div>
  ) : null;

  return (
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(135deg,#F0FDFA,#CCFBF1)',padding:20}}>
      <div className="fade-in" style={{background:'#fff',borderRadius:20,padding:'36px 40px',
        width:'100%',maxWidth:420,boxShadow:'0 20px 60px rgba(15,23,42,.10)'}}>

        <button onClick={step==='buscar' ? onBack : ()=>{setStep('buscar');setFound(null);setPin('');setPin2('');setError('');}}
          style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',
          gap:6,color:'#94A3B8',fontSize:13,fontFamily:'inherit',fontWeight:500,marginBottom:28,padding:0}}>
          <Icon name="back" size={15}/>{step==='buscar' ? 'Volver' : 'Usar otro RUT o correo'}
        </button>

        <div style={{width:52,height:52,borderRadius:14,background:'#F0FDFA',color:'#0D9488',
          display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
          <Icon name="person" size={26}/>
        </div>

        {/* PASO 1 — Buscar */}
        {step==='buscar' && <>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:8}}>Acceso docente</h1>
          <p style={{fontSize:14,color:'#64748B',marginBottom:20,lineHeight:1.55}}>
            Ingresa tu RUT o correo institucional.
          </p>

          <Field label="RUT o correo institucional" required error={error}
            hint="Ej: 12.345.678-9 · nombre@universidad.cl">
            <TInput value={input}
              onChange={e=>{ setInput(e.target.value); if(error) setError(''); }}
              onBlur={()=>{
                const v=input.trim();
                if(v && !v.includes('@')) {
                  const fmt=formatRut(v);
                  setInput(fmt);
                  if(fmt.replace(/[^0-9kK]/g,'').length>=2 && !validarRut(fmt))
                    setError('RUT inválido. Verifica el dígito verificador.');
                }
              }}
              autoFocus placeholder="RUT o correo"
              onKeyDown={e=>e.key==='Enter'&&handleFind()}/>
          </Field>
          <Btn onClick={handleFind} full size="lg" style={{marginTop:16}} disabled={loading}>
            {loading ? 'Buscando…' : 'Continuar'}
          </Btn>

        </>}

        {/* PASO 2 — Verificar PIN existente */}
        {step==='pin' && found && <div className="fade-in">
          <WelcomeCard/>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:8}}>Ingresa tu PIN</h2>
          <p style={{fontSize:13,color:'#64748B',marginBottom:20,lineHeight:1.5}}>
            Tu cuenta tiene un PIN de seguridad configurado.
          </p>
          <Field label="PIN" required error={error}>
            <TInput value={pin} onChange={e=>setPin(e.target.value)} type="password"
              placeholder="••••" autoFocus
              style={{fontSize:24,letterSpacing:8,textAlign:'center'}}
              onKeyDown={e=>e.key==='Enter'&&handlePin()}/>
          </Field>
          <Btn onClick={handlePin} full size="lg" style={{marginTop:16}}>Ingresar</Btn>
        </div>}

        {/* PASO 2b — Crear PIN (primer ingreso de docente existente) */}
        {step==='setup-pin' && found && <div className="fade-in">
          <WelcomeCard/>
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,
            padding:'10px 14px',marginBottom:20,fontSize:13,color:'#1D4ED8',lineHeight:1.5}}>
            ¡Bienvenido! Es tu primer ingreso al sistema. Puedes crear un PIN de seguridad para futuras sesiones, o ingresar directo sin él.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Field label="Crear PIN (opcional)" hint="4 a 8 caracteres — lo necesitarás en futuros ingresos">
              <TInput value={pin} onChange={e=>setPin(e.target.value)} type="password"
                placeholder="••••" style={{letterSpacing:4}}/>
            </Field>
            {pin && <Field label="Confirmar PIN" error={error}>
              <TInput value={pin2} onChange={e=>setPin2(e.target.value)} type="password"
                placeholder="••••" style={{letterSpacing:4}}
                onKeyDown={e=>e.key==='Enter'&&handleSetupPin()}/>
            </Field>}
          </div>
          <Btn onClick={handleSetupPin} full size="lg" style={{marginTop:20}}>
            {pin ? 'Guardar PIN e ingresar' : 'Ingresar sin PIN'}
          </Btn>
        </div>}

        {/* PASO 3 — Nuevo docente no registrado */}
        {step==='nuevo' && found && <div className="fade-in">
          <div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:8,
            padding:'10px 14px',marginBottom:20,fontSize:13,color:'#92400E',lineHeight:1.5}}>
            El RUT <strong>{found.rut}</strong> no está en el registro. Completa tus datos para continuar.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Field label="Nombre completo" required>
              <TInput value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))}
                placeholder="Nombre y apellido" autoFocus/>
            </Field>
            <Field label="Correo institucional">
              <TInput value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}
                type="email" placeholder="correo@universidad.cl"/>
            </Field>
            <Field label="Decanato / Área">
              <SInput value={form.especialidad} onChange={e=>setForm(p=>({...p,especialidad:e.target.value}))}
                options={FACULTADES} placeholder="Selecciona…"/>
            </Field>
            <Field label="Crear PIN (opcional)" hint="Para proteger tu cuenta en futuros ingresos">
              <TInput value={form.pin} onChange={e=>setForm(p=>({...p,pin:e.target.value}))}
                type="password" placeholder="••••" style={{letterSpacing:4}}/>
            </Field>
            {form.pin && <Field label="Confirmar PIN" error={error}>
              <TInput value={form.pin2} onChange={e=>setForm(p=>({...p,pin2:e.target.value}))}
                type="password" placeholder="••••" style={{letterSpacing:4}}/>
            </Field>}
          </div>
          <Btn onClick={handleNuevo} full size="lg" style={{marginTop:20}} disabled={!form.nombre}>
            Guardar y acceder
          </Btn>
        </div>}

      </div>

    </div>
  );
}

  if(step==='docente') return <DocenteLogin onSuccess={(rut)=>onSelect('docente',rut)} onBack={()=>setStep('choose')}/>;

  return (
    <div style={{minHeight:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',background:'linear-gradient(160deg,#F0FDFA 0%,#EFF6FF 50%,#F8FAFC 100%)',
      padding:'32px 20px'}}>
      <div className="fade-in" style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>

        {/* Logo + título */}
        <div style={{width:68,height:68,borderRadius:20,
          background:'linear-gradient(135deg,#0D9488 0%,#1E3A8A 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24,
          boxShadow:'0 12px 32px rgba(13,148,136,0.25)'}}>
          <Icon name="checkc" size={32} color="#fff"/>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',letterSpacing:2,
          textTransform:'uppercase',marginBottom:8}}>Sistema de Registro</div>
        <h1 style={{fontSize:28,fontWeight:800,color:'#0F172A',lineHeight:1.2,
          marginBottom:6,textAlign:'center'}}>Capacitaciones Docentes</h1>
        <p style={{fontSize:14,color:'#64748B',marginBottom:40,textAlign:'center'}}>
          Selecciona cómo deseas ingresar
        </p>

        {/* Botón principal — Docente */}
        <button onClick={()=>setStep('docente')} style={{width:'100%',background:'#0D9488',
          border:'none',borderRadius:16,padding:'22px 28px',cursor:'pointer',fontFamily:'inherit',
          display:'flex',alignItems:'center',gap:18,textAlign:'left',marginBottom:12,
          boxShadow:'0 8px 28px rgba(13,148,136,0.30)',transition:'all .18s'}}
          onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 12px 36px rgba(13,148,136,0.40)';}}
          onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 8px 28px rgba(13,148,136,0.30)';}}>
          <div style={{width:52,height:52,borderRadius:14,background:'rgba(255,255,255,0.2)',
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon name="person" size={26} color="#fff"/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:3}}>Soy docente</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.75)',lineHeight:1.4}}>
              Inscríbete en actividades y registra tu asistencia
            </div>
          </div>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:20}}>›</div>
        </button>

        {/* Separador */}
        <div style={{display:'flex',alignItems:'center',gap:12,width:'100%',margin:'8px 0 16px'}}>
          <div style={{flex:1,height:1,background:'#E2E8F0'}}/>
          <span style={{fontSize:12,color:'#CBD5E1',fontWeight:500}}>o</span>
          <div style={{flex:1,height:1,background:'#E2E8F0'}}/>
        </div>

        {/* Botón secundario — Admin */}
        <button onClick={()=>setStep('admin')} style={{width:'100%',background:'#fff',
          border:'1.5px solid #E2E8F0',borderRadius:12,padding:'14px 20px',cursor:'pointer',
          fontFamily:'inherit',display:'flex',alignItems:'center',gap:14,textAlign:'left',
          transition:'all .18s',boxShadow:'0 2px 8px rgba(15,23,42,0.05)'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#1E3A8A';e.currentTarget.style.background='#F8FAFC';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#E2E8F0';e.currentTarget.style.background='#fff';}}>
          <div style={{width:36,height:36,borderRadius:10,background:'#EFF6FF',
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon name="brief" size={18} color="#1E3A8A"/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:'#1E3A8A'}}>Acceso administrador</div>
            <div style={{fontSize:12,color:'#94A3B8'}}>Solo para personal del sistema</div>
          </div>
          <Icon name="back" size={14} color="#CBD5E1" style={{transform:'rotate(180deg)'}}/>
        </button>

        <p style={{fontSize:11,color:'#CBD5E1',marginTop:32,textAlign:'center'}}>
          Sistema de Registro de Capacitaciones Docentes
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ROOT APP
   ════════════════════════════════════════════════════════════════ */
function App() {
  const SESSION_TTL = 8 * 60 * 60 * 1000; // 8 horas
  const [session,  setSession]  = useState(()=>{
    try {
      // Admin puede estar en localStorage, docente en sessionStorage
      const raw = localStorage.getItem('cap_session') || sessionStorage.getItem('cap_session');
      const s = JSON.parse(raw);
      if (!s) return null;
      if (s.ts && (Date.now() - s.ts) > SESSION_TTL) {
        localStorage.removeItem('cap_session');
        sessionStorage.removeItem('cap_session');
        return null;
      }
      return s;
    } catch { return null; }
  });
  const [booting,  setBooting]  = useState(false);
  const [bootErr,  setBootErr]  = useState(false);
  const [bootWarn, setBootWarn] = useState(false);

  /* Al iniciar en modo GS, carga los datos frescos desde la hoja */
  useEffect(()=>{
    const cfg = getSPConfig();
    if(cfg.mode==='googlesheets' && cfg.gsUrl) {
      if(!session) setBooting(true);
      GoogleSheetsAPI.bootstrap().then(result=>{
        setBooting(false);
        autoOpenEvents(); // verificar aperturas programadas tras sincronizar con GS
        if(!result || !result.ok) {
          if(session) setBootWarn(true);
          else setBootErr(true);
        }
      });
    } else {
      autoOpenEvents(); // modo local: verificar aperturas con datos locales
    }
  },[]);

  function login(role,rut){
    const s={role,rut:rut||null,ts:Date.now()};
    setSession(s);
    // Admin usa localStorage (persiste), docente usa sessionStorage (se borra al cerrar)
    if(role==='admin') localStorage.setItem('cap_session',JSON.stringify(s));
    else sessionStorage.setItem('cap_session',JSON.stringify(s));
  }
  function logout(){
    setSession(null);
    localStorage.removeItem('cap_session');
    sessionStorage.removeItem('cap_session');
  }

  /* Pantalla de carga mientras bootstrap está en curso */
  if(booting) return (
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(145deg,#0F172A 0%,#1E3A8A 60%,#0D9488 100%)'}}>
      <div className="fade-in" style={{textAlign:'center',padding:40,display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
        {/* Logo animado */}
        <div style={{position:'relative',width:80,height:80,marginBottom:32}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'2px solid rgba(255,255,255,0.15)',animation:'spin 3s linear infinite'}}/>
          <div style={{position:'absolute',inset:6,borderRadius:'50%',border:'2px solid rgba(255,255,255,0.25)',animation:'spin 2s linear infinite reverse'}}/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{width:42,height:42,borderRadius:12,background:'rgba(255,255,255,0.12)',
              backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',
              border:'1px solid rgba(255,255,255,0.2)'}}>
              <Icon name="checkc" size={22} color="rgba(255,255,255,0.9)"/>
            </div>
          </div>
        </div>
        {/* Texto */}
        <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.5)',
          letterSpacing:3,textTransform:'uppercase',marginBottom:10}}>
          Capacitaciones
        </div>
        <div style={{fontSize:22,fontWeight:800,color:'#fff',marginBottom:6,letterSpacing:-0.5}}>
          Iniciando sesión
        </div>
        <div style={{fontSize:14,color:'rgba(255,255,255,0.45)',marginBottom:40}}>
          Sincronizando datos…
        </div>
        {/* Barra de progreso animada */}
        <div style={{width:200,height:2,background:'rgba(255,255,255,0.1)',borderRadius:1,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#0D9488,#3B82F6)',
            borderRadius:1,animation:'loading-bar 1.8s ease-in-out infinite'}}/>
        </div>
      </div>
      <style>{`@keyframes loading-bar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}`}</style>
    </div>
  );

  /* Error de conexión con GS al iniciar (sin sesión activa) */
  if(bootErr) return (
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F1F5F9'}}>
      <div className="fade-in" style={{textAlign:'center',padding:40,maxWidth:420}}>
        <div style={{width:56,height:56,borderRadius:16,background:'#FEE2E2',color:'#B91C1C',
          display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
          <Icon name="warn" size={28}/>
        </div>
        <div style={{fontSize:16,fontWeight:700,color:'#0F172A',marginBottom:8}}>
          No se pudo conectar con Google Sheets
        </div>
        <div style={{fontSize:13,color:'#64748B',lineHeight:1.6,marginBottom:24}}>
          Verifica que la URL del Apps Script sea correcta y que el script esté desplegado con acceso <em>Cualquier usuario</em>.
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
          <Btn onClick={()=>{ setBootErr(false); setBooting(true);
            GoogleSheetsAPI.bootstrap().then(r=>{ setBooting(false); if(!r||!r.ok) setBootErr(true); }); }}
            variant="primary">
            <Icon name="cloud" size={15}/>Reintentar conexión
          </Btn>
          <Btn onClick={()=>setBootErr(false)} variant="secondary">
            Continuar sin conexión
          </Btn>
        </div>
      </div>
    </div>
  );

  if(!session)                 return <RoleSelector onSelect={login}/>;
  return <>
    {bootWarn&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:2000,
      background:'#FEF3C7',borderBottom:'1px solid #FDE68A',padding:'8px 20px',
      display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,fontSize:13,color:'#92400E'}}>
      <span>⚠ No se pudo sincronizar con Google Sheets. Mostrando datos guardados localmente.</span>
      <button onClick={()=>setBootWarn(false)} style={{background:'none',border:'none',cursor:'pointer',
        color:'#92400E',fontWeight:700,fontSize:16,padding:'0 4px'}}>✕</button>
    </div>}
    {session.role==='admin'   && <AdminShell   onLogout={logout}/>}
    {session.role==='docente' && <DocenteShell rut={session.rut} onLogout={logout}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
